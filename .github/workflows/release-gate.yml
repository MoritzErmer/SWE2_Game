name: Release Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate-and-package:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write   # required for creating/updating GitHub Releases and tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install WiX Toolset 3.x
        shell: pwsh
        run: |
          choco upgrade wixtoolset --yes --no-progress
          $wixBin = (Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin" `
                      -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $wixBin) { throw "WiX bin directory not found after installation." }
          Add-Content $env:GITHUB_PATH $wixBin
          Write-Host "[wix] Registered in GITHUB_PATH: $wixBin"

      - name: Verify toolchain
        shell: pwsh
        run: ./scripts/verify-jdk17.ps1

      - name: Documentation consistency
        shell: pwsh
        run: ./scripts/check-doc-consistency.ps1

      - name: Version/artifact consistency
        shell: pwsh
        run: ./scripts/check-version-artifacts.ps1

      - name: Run test suite
        shell: pwsh
        run: mvn clean test

      - name: Build EXE
        shell: pwsh
        run: ./scripts/package-exe.ps1

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swe2-game-dist
          path: dist/*.exe

      - name: Publish GitHub Release (rolling latest)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (main)"
          body: |
            Automatisch gebaut aus Branch `main` — Commit ${{ github.sha }}

            **Keine Java-Installation nötig.** Installer ausführen, fertig.
          prerelease: true
          make_latest: true
          files: dist/*.exe
